name: Deploy backend to Azure Container Apps

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

env:
  ACR_LOGIN_SERVER: "margotranslatoracr.azurecr.io"
  IMAGE_NAME: "margo-api"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # NOTE:
      # We intentionally avoid Azure Resource Manager auth here (azure/login + az containerapp update),
      # because some tenants/subscriptions (e.g., school-managed) block creating app registrations /
      # service principals. This workflow only pushes a new image to ACR.
      #
      # Enable "Continuous deployment" on the Container App to auto-deploy on new image pushes.

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

